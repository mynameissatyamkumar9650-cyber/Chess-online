<body>
  <div class="bg"></div>
  <div id="app" class="app"></div>
  <noscript>
    <main style="max-width:860px;margin:40px auto;padding:24px;color:#f3f5fb;font-family:Arial,sans-serif;line-height:1.7;background:#111829;border-radius:16px">
      <h1>Play Chess Online Free - Chess Game Against Computer and Puzzles</h1>
      <p>Grandmaster Pro Chess is a free browser chess game where you can play chess online, challenge a computer chess AI, solve chess puzzles, learn chess rules, and practice local Pass &amp; Play offline.</p>
      <h2>Free Chess Game Features</h2>
      <ul>
        <li>Play chess against computer AI with beginner to advanced difficulty.</li>
        <li>Practice opening, middlegame, and endgame chess puzzles.</li>
        <li>Learn chess basics, tactics, openings, checkmate, and endgame principles.</li>
        <li>Play local Pass &amp; Play chess on one device.</li>
      </ul>
      <p>Please enable JavaScript to run the interactive chess board and computer AI.</p>
    </main>
  </noscript>

  <script>
    // Chess Rules Engine
    class Chess {
      constructor() { this.reset(); }

      reset() {
        this.boardMap = {};
        const back = ["r", "n", "b", "q", "k", "b", "n", "r"];
        const files = "abcdefgh";
        for (let f = 0; f < 8; f++) {
          this.boardMap[files[f] + "1"] = { type: back[f], color: "w" };
          this.boardMap[files[f] + "2"] = { type: "p", color: "w" };
          this.boardMap[files[f] + "7"] = { type: "p", color: "b" };
          this.boardMap[files[f] + "8"] = { type: back[f], color: "b" };
        }
        this.active = "w";
        this.rights = "KQkq";
        this.ep = null;
        this.halfmove = 0;
        this.fullmove = 1;
        this.moveHistory = [];
        this.undoStack = [];
        this.positionCounts = {};
        this.positionCounts[this.positionKey()] = 1;
      }

      loadFen(fen) {
        const parts = fen.trim().split(/\s+/);
        const rows = parts[0].split("/");
        this.boardMap = {};
        for (let r = 0; r < 8; r++) {
          const rank = 8 - r;
          let file = 0;
          for (const ch of rows[r]) {
            if (/\d/.test(ch)) file += Number(ch);
            else {
              const color = ch === ch.toUpperCase() ? "w" : "b";
              this.boardMap["abcdefgh"[file] + rank] = { type: ch.toLowerCase(), color };
              file++;
            }
          }
        }
        this.active = parts[1] === "b" ? "b" : "w";
        this.rights = parts[2] && parts[2] !== "-" ? parts[2] : "";
        this.ep = parts[3] && parts[3] !== "-" ? parts[3] : null;
        this.halfmove = Number(parts[4] || 0);
        this.fullmove = Number(parts[5] || 1);
        this.moveHistory = [];
        this.undoStack = [];
        this.positionCounts = {};
        this.positionCounts[this.positionKey()] = 1;
      }

      turn() { return this.active; }
      get(square) { return this.boardMap[square] || null; }
      other(color) { return color === "w" ? "b" : "w"; }
      square(file, rank) { return file >= 0 && file < 8 && rank >= 0 && rank < 8 ? "abcdefgh"[file] + (rank + 1) : null; }
      file(square) { return square.charCodeAt(0) - 97; }
      rank(square) { return Number(square[1]) - 1; }

      board() {
        const rows = [];
        for (let rank = 7; rank >= 0; rank--) {
          const row = [];
          for (let file = 0; file < 8; file++) row.push(this.get(this.square(file, rank)));
          rows.push(row);
        }
        return rows;
      }

      snapshot() {
        return {
          boardMap: { ...this.boardMap }, active: this.active, rights: this.rights,
          ep: this.ep, halfmove: this.halfmove, fullmove: this.fullmove,
          positionCounts: { ...this.positionCounts },
        };
      }

      restore(snapshot) {
        this.boardMap = snapshot.boardMap;
        this.active = snapshot.active;
        this.rights = snapshot.rights;
        this.ep = snapshot.ep;
        this.halfmove = snapshot.halfmove;
        this.fullmove = snapshot.fullmove;
        this.positionCounts = snapshot.positionCounts;
      }

      positionKey() {
        const pieces = Object.keys(this.boardMap).sort().map((sq) => {
          const p = this.boardMap[sq];
          return sq + p.color + p.type;
        }).join(",");
        return pieces + "|" + this.active + "|" + this.rights + "|" + (this.ep || "-");
      }

      fen() {
        const rows = [];
        for (let rank = 7; rank >= 0; rank--) {
          let row = "", blanks = 0;
          for (let file = 0; file < 8; file++) {
            const p = this.get(this.square(file, rank));
            if (!p) { blanks++; continue; }
            if (blanks) { row += blanks; blanks = 0; }
            row += p.color === "w" ? p.type.toUpperCase() : p.type;
          }
          rows.push(row + (blanks || ""));
        }
        return rows.join("/") + " " + this.active + " " + (this.rights || "-") + " " + (this.ep || "-") + " " + this.halfmove + " " + this.fullmove;
      }

      moves(options = {}) {
        let result = this.legalMoves();
        if (options.square) result = result.filter((m) => m.from === options.square);
        if (options.verbose) return result.map((m) => ({ ...m }));
        return result.map((m) => this.sanBase(m, result));
      }

      history(options = {}) {
        return options.verbose ? this.moveHistory.map((m) => ({ ...m })) : this.moveHistory.map((m) => m.san);
      }

      pgn() {
        const out = [];
        for (let i = 0; i < this.moveHistory.length; i += 2) {
          out.push((i / 2 + 1) + ". " + this.moveHistory[i].san + (this.moveHistory[i + 1] ? " " + this.moveHistory[i + 1].san : ""));
        }
        return out.join(" ") + (out.length ? " *" : "");
      }

      isCheck() { return this.inCheck(this.active); }
      isCheckmate() { return this.isCheck() && this.legalMoves().length === 0; }
      isStalemate() { return !this.isCheck() && this.legalMoves().length === 0; }
      isThreefoldRepetition() { return (this.positionCounts[this.positionKey()] || 0) >= 3; }
      isInsufficientMaterial() {
        const pieces = Object.entries(this.boardMap).filter(([, p]) => p.type !== "k");
        if (pieces.length === 0) return true;
        if (pieces.length === 1) return ["n", "b"].includes(pieces[0][1].type);
        if (pieces.every(([, p]) => p.type === "b")) {
          const colors = pieces.map(([sq]) => (this.file(sq) + this.rank(sq)) % 2);
          return colors.every((c) => c === colors[0]);
        }
        return false;
      }
      isDraw() { return this.isStalemate() || this.isThreefoldRepetition() || this.halfmove >= 100 || this.isInsufficientMaterial(); }
      isGameOver() { return this.isCheckmate() || this.isDraw(); }

      inCheck(color) {
        const king = Object.keys(this.boardMap).find((sq) => {
          const p = this.boardMap[sq];
          return p.color === color && p.type === "k";
        });
        return !king || this.isAttacked(king, this.other(color));
      }

      isAttacked(target, by) {
        const tf = this.file(target), tr = this.rank(target);
        for (const [from, piece] of Object.entries(this.boardMap)) {
          if (piece.color !== by) continue;
          const f = this.file(from), r = this.rank(from), df = tf - f, dr = tr - r;
          if (piece.type === "p" && dr === (by === "w" ? 1 : -1) && Math.abs(df) === 1) return true;
          if (piece.type === "n" && ((Math.abs(df) === 1 && Math.abs(dr) === 2) || (Math.abs(df) === 2 && Math.abs(dr) === 1))) return true;
          if (piece.type === "k" && Math.max(Math.abs(df), Math.abs(dr)) === 1) return true;
          const straight = df === 0 || dr === 0;
          const diagonal = Math.abs(df) === Math.abs(dr);
          if ((piece.type === "r" && straight) || (piece.type === "b" && diagonal) || (piece.type === "q" && (straight || diagonal))) {
            const sf = Math.sign(df), sr = Math.sign(dr);
            let cf = f + sf, cr = r + sr, clear = true;
            while (cf !== tf || cr !== tr) {
              if (this.get(this.square(cf, cr))) { clear = false; break; }
              cf += sf; cr += sr;
            }
            if (clear) return true;
          }
        }
        return false;
      }

      pseudoMoves() {
        const out = [], color = this.active;
        const add = (from, to, extra = {}) => {
          if (!to) return;
          const p = this.get(from), captured = this.get(to);
          if (captured && (captured.color === color || captured.type === "k")) return;
          out.push({ from, to, color, piece: p.type, captured: captured ? captured.type : undefined, ...extra });
        };
        for (const [from, p] of Object.entries(this.boardMap)) {
          if (p.color !== color) continue;
          const f = this.file(from), r = this.rank(from);
          if (p.type === "p") {
            const dir = color === "w" ? 1 : -1, start = color === "w" ? 1 : 6, promote = color === "w" ? 7 : 0;
            const one = this.square(f, r + dir);
            const pawnAdd = (to, extra = {}) => {
              if (this.rank(to) === promote) ["q", "r", "b", "n"].forEach((promotion) => add(from, to, { promotion, ...extra }));
              else add(from, to, extra);
            };
            if (one && !this.get(one)) {
              pawnAdd(one);
              const two = this.square(f, r + 2 * dir);
              if (r === start && two && !this.get(two)) add(from, two, { doublePawn: true });
            }
            for (const df of [-1, 1]) {
              const to = this.square(f + df, r + dir);
              if (!to) continue;
              const target = this.get(to);
              if (target && target.color !== color && target.type !== "k") pawnAdd(to);
              else if (this.ep === to) pawnAdd(to, { enPassant: true, captured: "p" });
            }
          } else if (p.type === "n") {
            [[1,2],[2,1],[-1,2],[-2,1],[1,-2],[2,-1],[-1,-2],[-2,-1]].forEach(([df,dr]) => add(from, this.square(f + df, r + dr)));
          } else if (p.type === "b" || p.type === "r" || p.type === "q") {
            const dirs = [];
            if (p.type === "b" || p.type === "q") dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
            if (p.type === "r" || p.type === "q") dirs.push([1,0],[-1,0],[0,1],[0,-1]);
            for (const [df, dr] of dirs) {
              let cf = f + df, cr = r + dr;
              while (true) {
                const to = this.square(cf, cr); if (!to) break;
                const target = this.get(to);
                if (!target) add(from, to);
                else { if (target.color !== color && target.type !== "k") add(from, to); break; }
                cf += df; cr += dr;
              }
            }
          } else if (p.type === "k") {
            for (let df = -1; df <= 1; df++) for (let dr = -1; dr <= 1; dr++) if (df || dr) add(from, this.square(f + df, r + dr));
            this.castleMoves(from, p, add);
          }
        }
        return out;
      }

      castleMoves(from, king, add) {
        const enemy = this.other(king.color), home = king.color === "w" ? "1" : "8";
        if (from !== "e" + home || this.inCheck(king.color)) return;
        const kRight = king.color === "w" ? "K" : "k", qRight = king.color === "w" ? "Q" : "q";
        if (this.rights.includes(kRight) && !this.get("f" + home) && !this.get("g" + home)) {
          const rook = this.get("h" + home);
          if (rook?.type === "r" && rook.color === king.color && !this.isAttacked("f" + home, enemy) && !this.isAttacked("g" + home, enemy)) add(from, "g" + home, { castle: "k" });
        }
        if (this.rights.includes(qRight) && !this.get("b" + home) && !this.get("c" + home) && !this.get("d" + home)) {
          const rook = this.get("a" + home);
          if (rook?.type === "r" && rook.color === king.color && !this.isAttacked("d" + home, enemy) && !this.isAttacked("c" + home, enemy)) add(from, "c" + home, { castle: "q" });
        }
      }

      legalMoves() {
        const legal = [], mover = this.active;
        for (const move of this.pseudoMoves()) {
          const snap = this.snapshot();
          this.applyRaw(move, false);
          if (!this.inCheck(mover)) legal.push(move);
          this.restore(snap);
        }
        return legal;
      }

      removeRight(right) { this.rights = this.rights.replace(right, ""); }

      applyRaw(move, trackPosition) {
        const piece = this.get(move.from);
        let captured = this.get(move.to);
        delete this.boardMap[move.from];
        if (move.enPassant) {
          const capSquare = move.to[0] + move.from[1];
          captured = this.get(capSquare);
          delete this.boardMap[capSquare];
        }
        this.boardMap[move.to] = { type: move.promotion || piece.type, color: piece.color };
        if (move.castle === "k") {
          const rank = piece.color === "w" ? "1" : "8";
          this.boardMap["f" + rank] = this.boardMap["h" + rank];
          delete this.boardMap["h" + rank];
        }
        if (move.castle === "q") {
          const rank = piece.color === "w" ? "1" : "8";
          this.boardMap["d" + rank] = this.boardMap["a" + rank];
          delete this.boardMap["a" + rank];
        }
        if (piece.type === "k") { this.removeRight(piece.color === "w" ? "K" : "k"); this.removeRight(piece.color === "w" ? "Q" : "q"); }
        if (piece.type === "r") {
          if (move.from === "a1") this.removeRight("Q"); if (move.from === "h1") this.removeRight("K");
          if (move.from === "a8") this.removeRight("q"); if (move.from === "h8") this.removeRight("k");
        }
        if (captured?.type === "r") {
          if (move.to === "a1") this.removeRight("Q"); if (move.to === "h1") this.removeRight("K");
          if (move.to === "a8") this.removeRight("q"); if (move.to === "h8") this.removeRight("k");
        }
        this.ep = move.doublePawn ? move.from[0] + ((Number(move.from[1]) + Number(move.to[1])) / 2) : null;
        this.halfmove = piece.type === "p" || captured ? 0 : this.halfmove + 1;
        if (piece.color === "b") this.fullmove++;
        this.active = this.other(piece.color);
        if (trackPosition) this.positionCounts[this.positionKey()] = (this.positionCounts[this.positionKey()] || 0) + 1;
      }

      sanBase(move, legal) {
        if (move.castle === "k") return "O-O";
        if (move.castle === "q") return "O-O-O";
        const letters = { p: "", n: "N", b: "B", r: "R", q: "Q", k: "K" };
        const capture = move.captured ? "x" : "";
        let disambiguation = "";
        if (move.piece !== "p") {
          const other = legal.filter((m) => m !== move && m.piece === move.piece && m.to === move.to);
          if (other.length) {
            const sameFile = other.some((m) => m.from[0] === move.from[0]);
            const sameRank = other.some((m) => m.from[1] === move.from[1]);
            disambiguation = !sameFile ? move.from[0] : !sameRank ? move.from[1] : move.from;
          }
        } else if (capture) disambiguation = move.from[0];
        return letters[move.piece] + disambiguation + capture + move.to + (move.promotion ? "=" + move.promotion.toUpperCase() : "");
      }

      move(spec) {
        const legal = this.legalMoves();
        const wantedPromo = spec.promotion || "q";
        const move = legal.find((m) => m.from === spec.from && m.to === spec.to && (!m.promotion || m.promotion === wantedPromo));
        if (!move) return null;
        const snapshot = this.snapshot();
        const san = this.sanBase(move, legal);
        this.applyRaw(move, true);
        const final = { ...move, san: san + (this.isCheckmate() ? "#" : this.isCheck() ? "+" : "") };
        this.moveHistory.push(final);
        this.undoStack.push({ snapshot, move: final });
        return final;
      }

      undo() {
        const last = this.undoStack.pop();
        if (!last) return null;
        this.restore(last.snapshot);
        this.moveHistory.pop();
        return last.move;
      }
    }

    // Application State and UI
    const app = document.getElementById("app");
    const P = { w:{p:"\u2659",n:"\u2658",b:"\u2657",r:"\u2656",q:"\u2655",k:"\u2654"}, b:{p:"\u265F",n:"\u265E",b:"\u265D",r:"\u265C",q:"\u265B",k:"\u265A"} };
    const values = {p:100,n:320,b:330,r:500,q:900,k:20000};
    const ratingDepth = {600:1,800:1,900:2,1300:3,2300:4};
    const AI_VS_AI_DEPTH = 8;
    const ratingName = {600:"NOVICE",800:"EASY",900:"MEDIUM",1300:"CHALLENGER",2300:"GRANDMASTER"};
    
    const PUZZLES = {
      opening: [
        { fen:"rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2", best:{from:"g1",to:"f3"}, title:"Develop with tempo", desc:"Attack e5 while bringing out the knight." },
        { fen:"rnbqkbnr/pppp1ppp/8/4p3/3PP3/8/PPP2PPP/RNBQKBNR b KQkq - 0 2", best:{from:"e5",to:"d4"}, title:"Capture the center", desc:"The d4 pawn is undefended \u2014 take it." },
        { fen:"r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3", best:{from:"g8",to:"f6"}, title:"Counter-attack e4", desc:"Develop and immediately pressure the e4 pawn." },
        { fen:"r1bqkbnr/pppp1ppp/2n5/1B2p3/4P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3", best:{from:"a7",to:"a6"}, title:"Question the bishop", desc:"Force the bishop to declare its intentions on b5." },
        { fen:"rnbqkbnr/ppp1pppp/8/3p4/2PP4/8/PP2PPPP/RNBQKBNR b KQkq - 0 2", best:{from:"e7",to:"e6"}, title:"Queen's Gambit Declined", desc:"Solidify d5 with the e-pawn." },

    function rememberPosition(key, score, depth) {

    // Puzzle Generation Functions
    function materialScore(g) {
      let s = 0;
      for (const row of g.board()) for (const p of row) if (p && p.type !== "k") s += values[p.type];
      return s;
    }
    function hasQueen(g) { return g.board().some(r => r.some(p => p && p.type === "q")); }
    function pieceName(t) { return {p:"pawn",n:"knight",b:"bishop",r:"rook",q:"queen",k:"king"}[t] || "piece"; }
    
    function puzzleTitle(cat) {
      return cat === "opening" ? "Convert your opening advantage"
           : cat === "mid" ? "Finish the middlegame attack"
           : "Deliver the endgame checkmate";
    }
    function puzzleDesc(cat) {
      return "You are winning \u2014 checkmate the engine (Minimax depth 4) to solve.";
    }
    function kingsAdjacent(a, b) {
      const af = a.charCodeAt(0) - 97, ar = +a[1] - 1;
      const bf = b.charCodeAt(0) - 97, br = +b[1] - 1;
      return Math.max(Math.abs(af - bf), Math.abs(ar - br)) <= 1;
    }
    function buildFen(occ, active) {
      const rows = [];
      for (let r = 7; r >= 0; r--) {
        let row = "", blanks = 0;
        for (let f = 0; f < 8; f++) {
          const sq = "abcdefgh"[f] + (r + 1);
          const p = occ[sq];
          if (!p) { blanks++; continue; }
          if (blanks) { row += blanks; blanks = 0; }
          row += p.color === "w" ? p.type.toUpperCase() : p.type;
        }
        if (blanks) row += blanks;
        rows.push(row);
      }
      return rows.join("/") + " " + active + " - - 0 1";
    }

    // Build a fresh random position where the user (White) is winning and must
    // checkmate the puzzle engine (Black). Each category has its own flavour.
    function generatePuzzle(cat) {
      const files = "abcdefgh";
      const rand = n => Math.floor(Math.random() * n);
      const randSq = () => files[rand(8)] + (1 + rand(8));

      const endSets = [["q"], ["r", "r"], ["q", "r"], ["q", "q"], ["q", "b"]];
      const midSets = [["q", "r"], ["q", "r", "b"], ["q", "b", "n"], ["r", "r", "b"], ["q", "r", "n"]];

      for (let attempt = 0; attempt < 700; attempt++) {
        const occ = {};
        const wk = randSq();
        const bk = randSq();
        if (wk === bk || kingsAdjacent(wk, bk)) continue;
        occ[wk] = { type: "k", color: "w" };
        occ[bk] = { type: "k", color: "b" };

        let whitePieces, whitePawns = 0, blackPawns = 0, blackExtras = [];
        if (cat === "end") {
          whitePieces = endSets[rand(endSets.length)];
        } else if (cat === "mid") {
          whitePieces = midSets[rand(midSets.length)];
          whitePawns = 2 + rand(3);
          blackPawns = 1 + rand(2);
          if (Math.random() < 0.5) blackExtras = ["n"];
          else if (Math.random() < 0.4) blackExtras = ["b"];
        } else { // opening
          whitePieces = ["q", "r", "r", "b", "n"];
          whitePawns = 5 + rand(3);
          blackPawns = 4 + rand(3);
          blackExtras = ["r", "b", "n"].filter(() => Math.random() < 0.6);
        }

        const placePiece = (piece) => {
          for (let t = 0; t < 80; t++) {
            const f = rand(8), r = rand(8);
            if (piece.type === "p" && (r === 0 || r === 7)) continue;
            const sq = files[f] + (r + 1);
            if (!occ[sq]) { occ[sq] = piece; return true; }
          }
          return false;
        };

        let ok = true;
        for (const t of whitePieces) if (!placePiece({ type: t, color: "w" })) { ok = false; break; }
        if (ok) for (let i = 0; i < whitePawns; i++) if (!placePiece({ type: "p", color: "w" })) { ok = false; break; }
        if (ok) for (const t of blackExtras) if (!placePiece({ type: t, color: "b" })) { ok = false; break; }
        if (ok) for (let i = 0; i < blackPawns; i++) if (!placePiece({ type: "p", color: "b" })) { ok = false; break; }
        if (!ok) continue;

        const fen = buildFen(occ, "w");
        const g = new Chess();
        try { g.loadFen(fen); } catch (e) { continue; }
        if (g.inCheck("b")) continue;      // opponent must not already be in check
        if (g.inCheck("w")) continue;      // start from a calm position
        if (g.isGameOver()) continue;      // not already finished
        if (g.moves().length < 4) continue;
        if (!markUsed(cat, fen)) continue; // never repeat a position
        return { fen, title: puzzleTitle(cat), desc: puzzleDesc(cat) };
      }

      // Guaranteed-winnable fallbacks (still white to move, user checkmates).
      const rand2 = n => Math.floor(Math.random() * n);
      const fb = {
        opening: "rnb1kbnr/pppp1ppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1",
        mid: ["5k2/8/8/8/8/8/4QP2/4K1R1 w - - 0 1", "6k1/8/8/8/8/5Q2/5PP1/4R1K1 w - - 0 1"][rand2(2)],
        end: ["4k3/8/8/8/8/8/8/3QK3 w - - 0 1", "4k3/8/8/8/8/8/8/R3K3 w - - 0 1", "4k3/8/8/8/8/8/4Q3/R3K3 w - - 0 1"][rand2(3)]
      }[cat];
      markUsed(cat, fb);
      return { fen: fb, title: puzzleTitle(cat), desc: puzzleDesc(cat) };
    }

    const LS_USED = "gambit.puzzles.used.v2";
    const usedPuzzles = {opening: new Set(), mid: new Set(), end: new Set()};
    try {
      const raw = localStorage.getItem(LS_USED);
      if (raw) {
        const p = JSON.parse(raw);
        for (const k of ["opening", "mid", "end"]) if (Array.isArray(p[k])) usedPuzzles[k] = new Set(p[k]);
      }

    function canon(fen) { const p = fen.split(/\s+/); return p.slice(0, 4).join(" "); }
    function markUsed(cat, fen) {
      const k = canon(fen);
      if (usedPuzzles[cat].has(k)) return false;
      usedPuzzles[cat].add(k);
      if (usedPuzzles[cat].size > 4000) {
        const a = Array.from(usedPuzzles[cat]);
        usedPuzzles[cat] = new Set(a.slice(Math.floor(a.length / 2)));

      return true;
    }

      const p = state.puzzle, cat = state.puzzleCat;
      const catLabel = {opening: "OPENING", mid: "MID-GAME", end: "ENDGAME"}[cat] || "PUZZLE";
      if (state.generating || !p) {
        app.innerHTML = header() + `<main class="screen" style="text-align:center;padding-top:80px"><div style="width:54px;height:54px;margin:0 auto 18px;border:3px solid rgba(124,92,255,.25);border-top-color:#7c5cff;border-radius:50%;animation:spin-slow .9s linear infinite"></div><h2 style="margin:0 0 8px">Generating puzzle\u2026</h2><p style="color:var(--muted)">Setting up a fresh random ${catLabel.toLowerCase()} position for you to win.</p></main>`;
        bindHeader(); return;
      }
      const statusText = state.puzzleSolved ? "\u2713 Solved \u2014 checkmate delivered!" : "Checkmate the engine to solve";
      app.innerHTML = header() + `<div class="gamebar"><span class="match">PUZZLE \u00B7 ${catLabel} \u00B7 You play White \u00B7 Goal: checkmate the engine</span><button id="home" class="smallbtn">Home</button></div><main class="game" style="grid-template-columns:minmax(280px,650px);justify-content:center;"><section class="board-column"><div class="puzzle-head"><span class="badge ${cat}">${catLabel}</span><span class="ptitle">${p.title}</span><span class="pstatus">${statusText}</span></div><div id="black" class="panel player"><div class="avatar">\u265A</div><div><div class="pname">Puzzle Engine</div><div class="psub" id="black-sub">Minimax \u03B1-\u03B2 \u00B7 depth 4</div></div></div><div id="board" class="chessboard"></div><div id="white" class="panel player" style="margin-top:8px"><div class="avatar">\u2654</div><div><div class="pname">You (White)</div><div class="psub" id="white-sub">${state.puzzleSolved ? "Solved! Load a new puzzle." : p.desc}</div></div></div>${state.puzzleSolved ? `<div class="puzzle-solved-banner">\u2713 Puzzle solved \u2014 you checkmated the engine!</div>` : ""}<div class="puzzle-controls"><button id="quit" class="quit">\u2190 Quit</button><button id="hint" class="hint" ${state.puzzleSolved ? "disabled" : ""}>\u2728 Hint</button><button id="newpuzzle" class="solve">\u21BB New Puzzle</button></div><section class="panel analysis" id="ai-analysis" style="margin-top:12px"><div class="label">AI BRAIN ANALYSIS</div><div style="color:var(--muted);font-size:12px;margin-top:8px">Waiting for the engine to move\u2026</div></section></section></main>`;
      bindHeader();
      document.getElementById("home").onclick = () => { clearInterval(state.timerId); state.screen = "home"; render(); };
      document.getElementById("quit").onclick = () => { state.screen = "home"; render(); };
      document.getElementById("hint").onclick = showHint;
      document.getElementById("newpuzzle").onclick = () => startPuzzle(state.puzzleCat);
      renderGame();
    }
    
    function showHint() {
      if (!state.puzzle || state.puzzleSolved || state.game.isGameOver()) return;
      if (state.game.turn() !== state.puzzleColor) return;
      clearTimeout(state.hintTimer);
      const mv = chooseAi(state.game, 3);
      if (!mv) return;
      state.hintFrom = mv.from; state.hintTo = mv.to;
      renderGame();
      state.hintTimer = setTimeout(() => { state.hintFrom = null; state.hintTo = null; if (state.screen === "puzzle-game") renderGame(); }, 3200);
      toast("Suggested move highlighted.");
    }
    
    function retryPuzzle() {
      if (!state.puzzle) return;
      const g = new Chess(); g.loadFen(state.puzzle.fen);
      state.game = g; state.puzzleSolved = false;
      state.selected = null; state.legal = []; state.last = null;
      state.past = []; state.redo = []; state.viewPly = null;
      state.hintFrom = null; state.hintTo = null; state.aiBusy = false;
      render();
    }

    function renderGame() {
      let game = state.game;
      if (state.viewPly !== null) {
        const snap = new Chess();
        const hist = state.game.history({verbose: true});
        for (let i = 0; i < state.viewPly && i < hist.length; i++) {
          const m = hist[i];
          snap.move({from: m.from, to: m.to, promotion: m.promotion || undefined});
        }
        game = snap;
      }
      const board = document.getElementById("board"); if (!board) return;
      board.innerHTML = "";
      const orient = state.mode === "puzzle" ? state.puzzleColor : (state.flipped ? "b" : "w");
      const files = orient === "b" ? ["h","g","f","e","d","c","b","a"] : ["a","b","c","d","e","f","g","h"];
      const ranks = orient === "b" ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
      const checkSq = findKing(game, game.turn());
      for (let ri = 0; ri < 8; ri++) for (let fi = 0; fi < 8; fi++) {
        const sq = files[fi] + ranks[ri], pc = game.get(sq), light = (ri + fi) % 2 === 0;
        const legal = state.legal.includes(sq), cap = legal && !!pc;
        const last = state.last && (state.last.from === sq || state.last.to === sq);
        const inCheck = game.isCheck() && checkSq === sq;
        const hintFrom = state.hintFrom === sq, hintTo = state.hintTo === sq;
        const b = document.createElement("button");
        b.className = `sq ${light ? "light" : "dark"}${state.selected === sq ? " selected" : ""}${last ? " last" : ""}${legal ? (cap ? " capture" : " legal") : ""}${inCheck ? " check" : ""}${hintFrom ? " hint" : ""}${hintTo ? " hint-to" : ""}`;
        b.dataset.sq = sq;
        b.innerHTML = `${pc ? `<span class="pc ${pc.color === "w" ? "white" : "black"}">${P[pc.color][pc.type]}</span>` : ""}${fi === 0 ? `<i class="coord rank">${ranks[ri]}</i>` : ""}${ri === 7 ? `<i class="coord file">${files[fi]}</i>` : ""}`;
        b.onclick = () => clickSquare(sq);
        board.appendChild(b);
      }
      const evalFill = document.getElementById("evalfill");
      if (evalFill) {
        const ev = evaluate(game), pct = Math.max(3, Math.min(97, 50 + Math.atan(ev / 300) / (Math.PI / 2) * 47));
        evalFill.style.height = pct + "%";
        const en = document.getElementById("evalnum"); if (en) en.textContent = `${ev >= 0 ? "+" : ""}${(ev / 100).toFixed(1)}`;
        const st = document.getElementById("status"); if (st) st.textContent = game.isCheck() ? `${game.turn() === "w" ? "White" : "Black"} is in check` : `${game.turn() === "w" ? "White" : "Black"} to move`;
      }
      updatePlayers(); renderCaptures(); renderMoves();
      if (typeof renderAnalysis === "function") renderAnalysis();
    }
    
    function currentUserColor() {
      if (state.mode === "pvp") return state.game.turn();
      if (state.mode === "ai") return "w";
      if (state.mode === "puzzle") return state.puzzleColor;
      return state.game.turn();
    }
    
    function clickSquare(sq) {
      if (state.aiBusy || state.game.isGameOver()) return;
      if (state.viewPly !== null) return;
      if (state.game.turn() !== currentUserColor()) return;
      const pc = state.game.get(sq);
      if (state.selected) {
        if (state.legal.includes(sq)) { makeMove(state.selected, sq); return; }
        state.selected = null; state.legal = [];
      }
      if (pc && pc.color === state.game.turn()) { state.selected = sq; state.legal = state.game.moves({square: sq, verbose: true}).map(m => m.to); soundIllegal(false); }
      renderGame();
    }
    
    function makeMove(from, to, promotion = "q") {
      let m;
      try { m = state.game.move({from, to, promotion}); } catch(e) { return soundIllegal(true); }
      if (!m) return soundIllegal(true);
      state.past.push({from: m.from, to: m.to, promotion: m.promotion || undefined});
      state.redo = []; state.last = {from: m.from, to: m.to};
      state.selected = null; state.legal = [];
      state.hintFrom = null; state.hintTo = null;
      playMoveEvent(m);
      // Puzzle solved only when the user (White) delivers checkmate to the engine.
      if (state.mode === "puzzle" && state.game.isCheckmate() && m.color === state.puzzleColor) {
        state.puzzleSolved = true;
      }
      renderGame();
      if (state.screen === "puzzle-game") { puzzleGame(); }
      checkEnd();
      const aiResponds = state.viewPly === null && !state.game.isGameOver() && (
        (state.mode === "ai" && state.game.turn() === "b") ||
        (state.mode === "puzzle" && state.game.turn() !== state.puzzleColor)
      );
      if (aiResponds) { state.aiBusy = true; setTimeout(aiTurn, 260); }
    }
    
    const THINKING_PHRASES = [
      "Imagining 2,000,000+ future moves...",
      "Evaluating Material & Piece Activity...",
      "Analyzing King Safety & Pawn Shields...",
      "Inspecting Center Control & Outposts...",
      "Checking Pawn Structure & Passed Pawns...",
      "Searching tactics via Quiescence Search...",
      "Consulting Endgame Tablebase...",
      "Deepening via Iterative Deepening...",
      "Accessing Transposition Table...",
      "Selecting best of 2,000,000 moves..."
    ];

    function cycleThinkingUI(phrases, index, totalDelay, startTimestamp, onFinish) {
      const elapsed = Date.now() - startTimestamp;
      if (elapsed >= totalDelay || state.game.isGameOver() || state.screen === "home") {
        onFinish();
        return;
      }

      const text = phrases[index % phrases.length];
      const turn = state.game.turn();
      const blackSub = document.getElementById("black-sub");

      if (state.screen === "puzzle-game") {
        if (blackSub && turn === "b") {
          blackSub.innerHTML = `<span style="color:#f59e0b; font-weight:700; animation:pulseGlow2 1s ease-in-out infinite">\u26DF ${text}</span>`;
        }
      } else if (state.screen === "game") {
        if (blackSub && turn === "b") {
          blackSub.innerHTML = `<span style="color:#f59e0b; font-weight:700; animation:pulseGlow2 1s ease-in-out infinite">\u26DF ${text}</span>`;
        }
      }

      setTimeout(() => {
        cycleThinkingUI(phrases, index + 1, totalDelay, startTimestamp, onFinish);
      }, 400);
    }

    function aiTurn() {
      const validScreen = state.screen === "game" || state.screen === "puzzle-game";
      if (state.game.isGameOver() || !validScreen || state.viewPly !== null) { state.aiBusy = false; return; }
      
      // Full-strength brain: search depth 10 in every mode & rating.
      const depth = 10;
      
      // Run the 15-step thinking brain + 2M-move imagination engine
      const brainStart = Date.now();
      const move = chooseAi(state.game, depth);
      renderAnalysis();

      // Total thinking window is 2 seconds (search + imagination + display)
      const elapsed = Date.now() - brainStart;
      const simulatedDelay = Math.max(300, 2000 - elapsed);
      const startTime = Date.now();

      state.aiThinking = true;

      cycleThinkingUI(THINKING_PHRASES, 0, simulatedDelay, startTime, () => {
        state.aiThinking = false;
        state.aiBusy = false;

        // Restore subtitles
        const blackSub = document.getElementById("black-sub");
        if (blackSub) {
          if (state.screen === "puzzle-game") {
            blackSub.textContent = "Minimax \u03B1-\u03B2 \u00B7 depth 10";
          } else {
            blackSub.textContent = state.mode === "ai" ? ratingName[state.rating] : "Pass & Play";
          }
        }

        if (move && !state.game.isGameOver() && (state.screen === "game" || state.screen === "puzzle-game")) {
          makeMove(move.from, move.to, move.promotion || "q");
        }
      });
    }

    // STEP 14/15 - render the AI brain's analysis to the panel
    function renderAnalysis() {
      const box = document.getElementById("ai-analysis");
      if (!box) return;
      const a = aiAnalysis;
      if (!a) { box.innerHTML = '<div class="label">AI ANALYSIS</div><div style="color:var(--muted);font-size:12px;margin-top:8px">Waiting for the engine to move\u2026</div>'; return; }
      const scoreStr = (a.score >= 0 ? "+" : "") + a.score.toFixed(2);
      const alts = a.alternatives.map((x, i) =>
        `<div style="display:flex;justify-content:space-between;font-family:ui-monospace,monospace;font-size:11px;padding:2px 0;${i === 0 ? "color:#34d399;font-weight:700" : "color:var(--muted)"}"><span>${i + 1}. ${x.san}</span><span>${(x.score >= 0 ? "+" : "") + x.score.toFixed(2)}</span></div>`
      ).join("");
      box.innerHTML = `
        <div class="label">AI BRAIN ANALYSIS</div>
        <div style="margin-top:8px;padding:8px 10px;border:1px solid rgba(52,211,153,.3);border-radius:8px;background:rgba(52,211,153,.07);text-align:center">
          <div style="font-family:ui-monospace,monospace;font-size:16px;font-weight:800;color:#34d399">${(a.imagined || a.nodes || 0).toLocaleString()}</div>
          <div style="font-size:9px;letter-spacing:.18em;color:var(--muted);font-weight:800;margin-top:2px">MOVES IMAGINED IN 2s</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-family:ui-monospace,monospace;font-size:12px">
          <span>Eval <strong style="color:${a.score >= 0 ? "#e8ecf7" : "#fb7185"}">${scoreStr}</strong></span>
          <span>Depth ${a.depth}${a.book ? " \u00B7 book" : ""}</span>
          <span>${(a.nodes || 0).toLocaleString()} nodes</span>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">Best line</div>
        <div style="font-family:ui-monospace,monospace;font-size:11px;color:#c7d2fe;line-height:1.5;word-break:break-word">${a.pv.join(" ")}</div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">Top candidates</div>
        ${alts}
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">Tactical ideas</div>
        <div style="font-size:11px;color:#fde68a">${(a.tactics.length ? a.tactics : ["Quiet position"]).join(" \u00B7 ")}</div>
        <div style="margin-top:6px;font-size:11px;color:var(--muted)">Strategic ideas</div>
        <div style="font-size:11px;color:#6ee7b7">${a.strategy.join(" \u00B7 ")}</div>
      `;
    }
    
    function undo() {
      if (state.aiBusy || !state.past.length) return;
      let n = state.mode === "ai" ? 2 : 1;
      while (n-- && state.past.length) { const m = state.game.undo(); if (m) state.redo.unshift(state.past.pop()); }
      state.last = state.past.length ? state.past[state.past.length - 1] : null; renderGame();
    }
    
    function redo() {
      if (state.aiBusy || !state.redo.length) return;
      let n = state.mode === "ai" ? 2 : 1;
      while (n-- && state.redo.length) {
        const m = state.redo.shift();
        try { state.game.move(m); state.past.push(m); } catch(e) {}
      }
      state.last = state.past.length ? state.past[state.past.length - 1] : null; renderGame();
    }
    
    function renderMoves() {
      const list = document.getElementById("movelist"); if (!list) return;
      const moves = state.game.history();
      const cur = (state.viewPly === null ? moves.length : state.viewPly);
      list.innerHTML = "";
      for (let i = 0; i < moves.length; i += 2) {
        const row = document.createElement("div"); row.className = "mrow";
        const wActive = cur === i, bActive = cur === i + 1;
        row.innerHTML = `<span class="mnum">${i / 2 + 1}.</span><span class="mcell" style="${wActive ? 'background:rgba(245,158,11,.18);color:#f59e0b;border-radius:4px' : ''}">${moves[i] || ""}</span><span class="mcell" style="${bActive ? 'background:rgba(245,158,11,.18);color:#f59e0b;border-radius:4px' : ''}">${moves[i + 1] || ""}</span>`;
        list.appendChild(row);
      }
      list.scrollTop = list.scrollHeight;
      const mi = document.getElementById("moveinfo"); if (mi) mi.textContent = `${state.viewPly === null ? "LIVE" : `PLY ${state.viewPly + 1}`} / ${moves.length}`;
      const nb = document.getElementById("nav-first"), np = document.getElementById("nav-prev"), nn = document.getElementById("nav-next"), nl = document.getElementById("nav-live");
      if (nb) nb.onclick = () => { state.viewPly = 0; renderGame(); };
      if (np) np.onclick = () => { const cur2 = state.viewPly === null ? moves.length : state.viewPly; state.viewPly = Math.max(0, cur2 - 1); renderGame(); };
      if (nn) nn.onclick = () => { const cur2 = state.viewPly === null ? moves.length : state.viewPly; state.viewPly = Math.min(moves.length - 1, cur2 + 1); renderGame(); };
      if (nl) nl.onclick = () => { state.viewPly = null; renderGame(); };
    }
    
    function renderCaptures() {
      const cw = document.getElementById("capw"), cb = document.getElementById("capb");
      if (!cw || !cb) return;
      const hist = state.game.history({verbose: true});
      let w = "", b = "";
      hist.forEach(m => { if (m.captured) { const c = m.color === "w" ? "b" : "w"; if (m.color === "w") w += P[c][m.captured]; else b += P[c][m.captured]; } });
      cw.textContent = w; cb.textContent = b;
    }
    
    function findKing(g, color) {
      const a = g.board();
      for (let r = 0; r < 8; r++) for (let f = 0; f < 8; f++) if (a[r][f]?.type === "k" && a[r][f].color === color) return "abcdefgh"[f] + (8 - r);
      return null;
    }
    
    function formatTime(t) { if (t === null) return "\u221E"; t = Math.max(0, Math.ceil(t)); return `${Math.floor(t / 60)}:${String(t % 60).padStart(2, "0")}`; }
    
    function updatePlayers() {
      const turn = state.game.turn();
      const w = document.getElementById("white"), b = document.getElementById("black");
      if (!w || !b) return;
      w.classList.toggle("active", turn === "w"); b.classList.toggle("active", turn === "b");
      w.classList.toggle("low", state.clocks.w !== null && state.clocks.w < 30);
      b.classList.toggle("low", state.clocks.b !== null && state.clocks.b < 30);
      const wt = document.getElementById("wtimer"), bt = document.getElementById("btimer");
      if (wt) wt.textContent = formatTime(state.clocks.w);
      if (bt) bt.textContent = formatTime(state.clocks.b);
    }
    
    function startTimer() {
      clearInterval(state.timerId);
      if (state.time === null) return;
      state.timerId = setInterval(() => {
        if (state.screen !== "game" || state.game.isGameOver()) return;
        const c = state.game.turn();
        state.clocks[c] -= .2;
        if (state.clocks[c] <= 0) {
          state.clocks[c] = 0; clearInterval(state.timerId); renderGame();
          showEnd(`${c === "w" ? "Black" : "White"} wins on time`);
        } else updatePlayers();
      }, 200);
    }
    
    function checkEnd() {
      if (!state.game.isGameOver()) return;
      clearInterval(state.timerId);
      if (state.mode === "puzzle") {
        let text, win = false;
        if (state.game.isCheckmate()) {
          if (state.game.turn() !== state.puzzleColor) { text = "Puzzle solved! You checkmated the engine."; win = true; }
          else text = "The engine checkmated you.";
        } else {
          text = "Draw \u2014 the engine slipped away.";
        }
        showPuzzleEnd(text, win);
        return;
      }
      let t = "Draw";
      if (state.game.isCheckmate()) t = `${state.game.turn() === "w" ? "Black" : "White"} wins by checkmate`;
      else if (state.game.isStalemate()) t = "Draw by stalemate";
      else if (state.game.isThreefoldRepetition()) t = "Draw by repetition";
      else if (state.game.isInsufficientMaterial()) t = "Draw by insufficient material";
      else t = "Draw by fifty-move rule";
      showEnd(t);
    }
    
    function showEnd(text) {
      app.insertAdjacentHTML("beforeend", `<div class="modalback"><div class="modal"><div style="font-size:62px;color:#c084fc">${text.includes("wins") ? "\u265A" : "\u00BD"}</div><h2>${text}</h2><p>Review the moves or start another game.</p><div class="actions"><button id="review" class="smallbtn">Review</button><button id="new" class="smallbtn">New Game</button></div></div></div>`);
      document.getElementById("review").onclick = () => document.querySelector(".modalback")?.remove();
      document.getElementById("new").onclick = () => { clearInterval(state.timerId); state.screen = "home"; render(); };
    }
    
    function showPuzzleEnd(text, win) {
      app.insertAdjacentHTML("beforeend", `<div class="modalback"><div class="modal"><div style="font-size:62px;color:${win ? "#34d399" : "#fb7185"}">${win ? "\u2714" : "\u265A"}</div><h2>${text}</h2><p>${win ? "Great finish! Load another random position." : "Try again or load a new random puzzle."}</p><div class="actions"><button id="pz-retry" class="smallbtn">Retry</button><button id="pz-next" class="smallbtn" style="color:#f59e0b;border-color:rgba(245,158,11,.35)">New Puzzle</button><button id="pz-home" class="smallbtn">Home</button></div></div></div>`);
      document.getElementById("pz-retry").onclick = () => { document.querySelector(".modalback")?.remove(); retryPuzzle(); };
      document.getElementById("pz-next").onclick = () => { document.querySelector(".modalback")?.remove(); startPuzzle(state.puzzleCat); };
      document.getElementById("pz-home").onclick = () => { document.querySelector(".modalback")?.remove(); clearInterval(state.timerId); state.screen = "home"; render(); };
    }
    
    function resign() {
      if (!state.game.isGameOver()) { clearInterval(state.timerId); showEnd(`${state.game.turn() === "w" ? "Black" : "White"} wins by resignation`); }
    }
    
    function offerDraw() {
      if (state.mode === "pvp") { showEnd("Draw by agreement"); }
      else { const score = evaluate(state.game); if (score > 100) showEnd("Draw accepted by computer"); else toast("The computer declines the draw."); }
    }
    
    function flipBoard() { state.flipped = !state.flipped; renderGame(); }
    
    function toast(t) {
      const x = document.createElement("div"); x.className = "toast"; x.textContent = t;
      document.body.appendChild(x); setTimeout(() => x.remove(), 2400);
    }

    // ==========================================
    // UPGRADED GRANDMASTER CHESS ENGINE
    // ==========================================
    function evaluate(g) {
      if (g.isCheckmate()) return g.turn() === "w" ? -100000 : 100000;
      if (g.isDraw()) return 0;

      let score = 0;
      const board = g.board();
      
      let wPiecesCount = 0;
      let bPiecesCount = 0;
      let totalMaterial = 0;

      const pawnFiles = { w: new Array(8).fill(0), b: new Array(8).fill(0) };
      const kings = { w: null, b: null };

      for (let r = 0; r < 8; r++) {
        for (let f = 0; f < 8; f++) {
          const p = board[r][f];
          if (!p) continue;
          
          totalMaterial += values[p.type];
          if (p.color === "w") {
            wPiecesCount++;
            if (p.type === "p") pawnFiles.w[f]++;
            if (p.type === "k") kings.w = { r, f };
          } else {
            bPiecesCount++;
            if (p.type === "p") pawnFiles.b[f]++;
            if (p.type === "k") kings.b = { r, f };
          }
        }
      }

      const isEndgame = totalMaterial < 1500;

      const pawnPST = [
        [  0,   0,   0,   0,   0,   0,   0,   0],
        [ 50,  50,  50,  50,  50,  50,  50,  50],
        [ 10,  10,  20,  30,  30,  20,  10,  10],
        [  5,   5,  10,  25,  25,  10,   5,   5],
        [  0,   0,   0,  20,  20,   0,   0,   0],
        [  5,  -5, -10,   0,   0, -10,  -5,   5],
        [  5,  10,  10, -20, -20,  10,  10,   5],
        [  0,   0,   0,   0,   0,   0,   0,   0]
      ];

      const knightPST = [
        [-50, -40, -30, -30, -30, -30, -40, -50],
        [-40, -20,   0,   0,   0,   0, -20, -40],
        [-30,   0,  10,  15,  15,  10,   0, -30],
        [-30,   5,  15,  20,  20,  15,   5, -30],
        [-30,   0,  15,  20,  20,  15,   0, -30],
        [-30,   5,  10,  15,  15,  10,   5, -30],
        [-40, -20,   0,   5,   5,   0, -20, -40],
        [-50, -40, -30, -30, -30, -30, -40, -50]
      ];

      const bishopPST = [
        [-20, -10, -10, -10, -10, -10, -10, -20],
        [-10,   0,   0,   0,   0,   0,   0, -10],
        [-10,   0,   5,  10,  10,   5,   0, -10],
        [-10,   5,   5,  10,  10,   5,   5, -10],
        [-10,   0,  10,  10,  10,  10,   0, -10],
        [-10,  10,  10,  10,  10,  10,  10, -10],
        [-10,   5,   0,   0,   0,   0,   5, -10],
        [-20, -10, -10, -10, -10, -10, -10, -20]
      ];

      const rookPST = [
        [  0,   0,   0,   0,   0,   0,   0,   0],
        [  5,  10,  10,  10,  10,  10,  10,   5],
        [ -5,   0,   0,   0,   0,   0,   0,  -5],
        [ -5,   0,   0,   0,   0,   0,   0,  -5],
        [ -5,   0,   0,   0,   0,   0,   0,  -5],
        [ -5,   0,   0,   0,   0,   0,   0,  -5],
        [ -5,   0,   0,   0,   0,   0,   0,  -5],
        [  0,   0,   0,   5,   5,   0,   0,   0]
      ];

      const queenPST = [
        [-20, -10, -10,  -5,  -5, -10, -10, -20],
        [-10,   0,   0,   0,   0,   0,   0, -10],
        [-10,   0,   5,   5,   5,   5,   0, -10],
        [ -5,   0,   5,   5,   5,   5,   0,  -5],
        [  0,   0,   5,   5,   5,   5,   0,  -5],
        [-10,   5,   5,   5,   5,   5,   0, -10],
        [-10,   0,   5,   0,   0,   0,   0, -10],
        [-20, -10, -10,  -5,  -5, -10, -10, -20]
      ];

      const kingMiddlePST = [
        [-30, -40, -40, -50, -50, -40, -40, -30],
        [-30, -40, -40, -50, -50, -40, -40, -30],
        [-30, -40, -40, -50, -50, -40, -40, -30],
        [-30, -40, -40, -50, -50, -40, -40, -30],
        [-20, -30, -30, -40, -40, -30, -30, -20],
        [-10, -20, -20, -20, -20, -20, -20, -10],
        [ 20,  20,   0,   0,   0,   0,  20,  20],
        [ 20,  30,  10,   0,   0,  10,  30,  20]
      ];

      const kingEndgamePST = [
        [-50, -40, -30, -20, -20, -30, -40, -50],
        [-30, -20, -10,   0,   0, -10, -20, -30],
        [-30, -10,  20,  30,  30,  20, -10, -30],
        [-30, -10,  30,  40,  40,  30, -10, -30],
        [-30, -10,  30,  40,  40,  30, -10, -30],
        [-30, -10,  20,  30,  30,  20, -10, -30],
        [-30, -30,   0,   0,   0,   0, -30, -30],
        [-50, -30, -30, -30, -30, -30, -30, -50]
      ];

      for (let r = 0; r < 8; r++) {
        for (let f = 0; f < 8; f++) {
          const p = board[r][f];
          if (!p) continue;

          const sign = p.color === "w" ? 1 : -1;
          
          // Material Evaluation
          let val = values[p.type] || 0;
          score += sign * val;

          // Piece-Square Tables (Piece Activity)
          const tableRow = p.color === "w" ? r : 7 - r;
          let pstVal = 0;
          if (p.type === "p") pstVal = pawnPST[tableRow][f];
          else if (p.type === "n") pstVal = knightPST[tableRow][f];
          else if (p.type === "b") pstVal = bishopPST[tableRow][f];
          else if (p.type === "r") pstVal = rookPST[tableRow][f];
          else if (p.type === "q") pstVal = queenPST[tableRow][f];
          else if (p.type === "k") pstVal = isEndgame ? kingEndgamePST[tableRow][f] : kingMiddlePST[tableRow][f];
          score += sign * pstVal;

          // Center Control
          if ((r === 3 || r === 4) && (f === 3 || f === 4)) {
            score += sign * 15;
          }

          // Pawn Structure (Doubled & Isolated Pawns)
          if (p.type === "p") {
            const doubledCount = p.color === "w" ? pawnFiles.w[f] : pawnFiles.b[f];
            if (doubledCount > 1) {
              score -= sign * 12;
            }
            const leftFile = f > 0 ? (p.color === "w" ? pawnFiles.w[f - 1] : pawnFiles.b[f - 1]) : 0;
            const rightFile = f < 7 ? (p.color === "w" ? pawnFiles.w[f + 1] : pawnFiles.b[f + 1]) : 0;
            if (leftFile === 0 && rightFile === 0) {
              score -= sign * 10;
            }

            // Passed Pawns
            let isPassed = true;
            const startRank = p.color === "w" ? r - 1 : r + 1;
            const stopRank = p.color === "w" ? 0 : 7;
            const step = p.color === "w" ? -1 : 1;
            const opponentColor = p.color === "w" ? "b" : "w";

            for (let checkRank = startRank; p.color === "w" ? checkRank >= stopRank : checkRank <= stopRank; checkRank += step) {
              for (let df = -1; df <= 1; df++) {
                const checkFile = f + df;
                if (checkFile >= 0 && checkFile < 8) {
                  const checkPiece = board[checkRank][checkFile];
                  if (checkPiece && checkPiece.type === "p" && checkPiece.color === opponentColor) {
                    isPassed = false;
                    break;
                  }
                }
              }
              if (!isPassed) break;
            }

            if (isPassed) {
              const passBonus = (p.color === "w" ? (7 - r) : r) * 15;
              score += sign * passBonus;
            }
          }
        }
      }

      // King Safety (Middlegame pawn shield)
      if (!isEndgame) {
        ["w", "b"].forEach((col) => {
          const kingLoc = kings[col];
          if (kingLoc) {
            let shieldBonus = 0;
            const kingSign = col === "w" ? 1 : -1;
            const shieldRank = col === "w" ? kingLoc.r - 1 : kingLoc.r + 1;
            if (shieldRank >= 0 && shieldRank < 8) {
              for (let df = -1; df <= 1; df++) {
                const shieldFile = kingLoc.f + df;
                if (shieldFile >= 0 && shieldFile < 8) {
                  const p = board[shieldRank][shieldFile];
                  if (p && p.type === "p" && p.color === col) {
                    shieldBonus += 12;
                  }
                }
              }
            }
            score += kingSign * shieldBonus;
          }
        });
      }

      // Endgame corner pushing Tablebase heuristics
      if (isEndgame) {
        const wPoints = wPiecesCount;
        const bPoints = bPiecesCount;
        if (wPoints !== bPoints) {
          const strongKing = wPoints > bPoints ? kings.w : kings.b;
          const weakKing = wPoints > bPoints ? kings.b : kings.w;
          if (strongKing && weakKing) {
            const dist = Math.max(Math.abs(strongKing.r - weakKing.r), Math.abs(strongKing.f - weakKing.f));
            const weakCenterDist = Math.max(Math.abs(3.5 - weakKing.r), Math.abs(3.5 - weakKing.f));
            const forceMateBonus = Math.round(weakCenterDist * 10 - dist * 4);
            score += (wPoints > bPoints ? 1 : -1) * forceMateBonus;
          }
        }
      }

      // Mobility
      const mobility = g.moves().length;
      score += (g.turn() === "w" ? 1 : -1) * mobility * 2.2;

      return score;
    }

    function ordered(g) {
      return g.moves({verbose: true}).sort((a, b) => {
        // Transposition Table recommendation can go first (handled during search)
        // Checks go high
        const aCheck = g.get(a.to)?.type === "k" ? 15000 : 0;
        const bCheck = g.get(b.to)?.type === "k" ? 15000 : 0;
        
        const aCap = a.captured ? 10000 + (values[a.captured] * 10 - (values[a.piece] || 0)) : 0;
        const bCap = b.captured ? 10000 + (values[b.captured] * 10 - (values[b.piece] || 0)) : 0;
        
        const aPromo = a.promotion ? 900 : 0;
        const bPromo = b.promotion ? 900 : 0;

        return (bCheck + bCap + bPromo) - (aCheck + aCap + aPromo);
      });
    }

    // Quiescence Search to avoid horizon effect on tactical trades
    function quiescence(g, alpha, beta) {
      let standPat = evaluate(g);
      if (g.turn() === "w") {
        if (standPat >= beta) return beta;
        if (standPat > alpha) alpha = standPat;
        const ms = ordered(g).filter(m => m.captured || m.promotion);
        for (const m of ms) {
          g.move(m);
          const score = quiescence(g, alpha, beta);
          g.undo();
          if (score >= beta) return beta;
          if (score > alpha) alpha = score;
        }
        return alpha;
      } else {
        if (standPat <= alpha) return alpha;
        if (standPat < beta) beta = standPat;
        const ms = ordered(g).filter(m => m.captured || m.promotion);
        for (const m of ms) {
          g.move(m);
          const score = quiescence(g, alpha, beta);
          g.undo();
          if (score <= alpha) return alpha;
          if (score < beta) beta = score;
        }
        return beta;
      }
    }

    function mini(g, d, a, b, max, startTime, limit) {
      AI_NODES++;
      if (performance.now() - startTime > limit) {
        return evaluate(g); // early cutoff timeout
      }

      const key = g.positionKey();
      const cached = TRANSPOSITION_TABLE.get(key);
      if (cached && cached.depth >= d) {
        if (cached.flag === "exact") return cached.val;
        if (cached.flag === "alpha" && cached.val <= a) return a;
        if (cached.flag === "beta" && cached.val >= b) return b;
      }

      if (d === 0 || g.isGameOver()) {
        return quiescence(g, a, b);
      }

      const ms = ordered(g);
      let bestMoveFound = null;

      if (max) {
        let v = -Infinity;
        let flag = "alpha";
        for (const m of ms) {
          g.move(m);
          const score = mini(g, d - 1, a, b, false, startTime, limit);
          g.undo();

          if (score > v) {
            v = score;
            bestMoveFound = m;
          }
          a = Math.max(a, v);
          if (a >= b) {
            flag = "beta";
            break;
          }
        }
        if (v > -Infinity) {
          if (flag === "alpha" && v > a) flag = "exact";
          TRANSPOSITION_TABLE.set(key, { val: v, depth: d, flag, bestMove: bestMoveFound });
        }
        return v;
      } else {
        let v = Infinity;
        let flag = "beta";
        for (const m of ms) {
          g.move(m);
          const score = mini(g, d - 1, a, b, true, startTime, limit);
          g.undo();

          if (score < v) {
            v = score;
            bestMoveFound = m;
          }
          b = Math.min(b, v);
          if (a >= b) {
            flag = "alpha";
            break;
          }
        }
        if (v < Infinity) {
          if (flag === "beta" && v < b) flag = "exact";
          TRANSPOSITION_TABLE.set(key, { val: v, depth: d, flag, bestMove: bestMoveFound });
        }
        return v;
      }
    }

    // ============================================================
    // HIGH-SPEED IMAGINATION ENGINE
    // Simulates 2,000,000+ candidate moves on a raw typed-array
    // board within the 2-second thinking budget. Every generated
    // move is one "imagined move". Runs capture-biased playouts
    // so the imagination explores realistic tactical futures.
    // ============================================================
    const IMAGINE_TARGET = 2000000;
    function fastImagine(g, budgetMs, target) {
      const codeOf = { p:1, n:2, b:3, r:4, q:5, k:6 };
      const b0 = new Int8Array(64); // + = white, - = black
      for (const [sq, p] of Object.entries(g.boardMap)) {
        const idx = (sq.charCodeAt(0) - 97) + (Number(sq[1]) - 1) * 8;
        b0[idx] = (p.color === "w" ? 1 : -1) * codeOf[p.type];
      }
      const KN = [[1,2],[2,1],[-1,2],[-2,1],[1,-2],[2,-1],[-1,-2],[-2,-1]];
      const DIAG = [[1,1],[1,-1],[-1,1],[-1,-1]], ORTH = [[1,0],[-1,0],[0,1],[0,-1]];
      const ALLD = DIAG.concat(ORTH);
      const moves = new Int32Array(256);
      let count = 0;
      const start = performance.now();

      function gen(b, side) {
        let n = 0;
        for (let i = 0; i < 64 && n < 240; i++) {
          const pc = b[i]; if (!pc || (pc > 0 ? 1 : -1) !== side) continue;
          const t = pc > 0 ? pc : -pc, f = i % 8, r = (i / 8) | 0;
          if (t === 1) {
            const nr = r + side;
            if (nr >= 0 && nr < 8) {
              if (!b[nr * 8 + f]) { moves[n++] = i * 64 + (nr * 8 + f); count++; }
              for (let dfi = -1; dfi <= 1; dfi += 2) {
                const nf = f + dfi;
                if (nf >= 0 && nf < 8) {
                  const j = nr * 8 + nf;
                  if (b[j] && (b[j] > 0 ? 1 : -1) !== side) { moves[n++] = i * 64 + j; count++; }
                }
              }
            }
          } else if (t === 2) {
            for (let k = 0; k < 8; k++) {
              const nf = f + KN[k][0], nr = r + KN[k][1];
              if (nf >= 0 && nf < 8 && nr >= 0 && nr < 8) {
                const j = nr * 8 + nf;
                if (!b[j] || (b[j] > 0 ? 1 : -1) !== side) { moves[n++] = i * 64 + j; count++; }
              }
            }
          } else if (t === 6) {
            for (let df = -1; df <= 1; df++) for (let dr = -1; dr <= 1; dr++) {
              if (!df && !dr) continue;
              const nf = f + df, nr = r + dr;
              if (nf >= 0 && nf < 8 && nr >= 0 && nr < 8) {
                const j = nr * 8 + nf;
                if (!b[j] || (b[j] > 0 ? 1 : -1) !== side) { moves[n++] = i * 64 + j; count++; }
              }
            }
          } else {
            const dirs = t === 3 ? DIAG : t === 4 ? ORTH : ALLD;
            for (let k = 0; k < dirs.length; k++) {
              let nf = f + dirs[k][0], nr = r + dirs[k][1];
              while (nf >= 0 && nf < 8 && nr >= 0 && nr < 8) {
                const j = nr * 8 + nf;
                if (!b[j]) { moves[n++] = i * 64 + j; count++; }
                else { if ((b[j] > 0 ? 1 : -1) !== side) { moves[n++] = i * 64 + j; count++; } break; }
                nf += dirs[k][0]; nr += dirs[k][1];
              }
            }
          }
        }
        return n;
      }

      const work = new Int8Array(64);
      const side0 = g.turn() === "w" ? 1 : -1;
      let guard = 0;
      while (count < target && performance.now() - start < budgetMs && guard < 400000) {
        guard++;
        work.set(b0);
        let side = side0;
        for (let ply = 0; ply < 3; ply++) {
          const n = gen(work, side);
          if (!n) break;
          // capture-biased random pick
          let pick = -1;
          for (let k = 0; k < 8 && k < n; k++) {
            const cand = moves[(Math.random() * n) | 0];
            if (work[cand % 64]) { pick = cand; break; }
          }
          if (pick < 0) pick = moves[(Math.random() * n) | 0];
          work[pick % 64] = work[(pick / 64) | 0];
          work[(pick / 64) | 0] = 0;
          side = -side;
        }
      }
      return count;
    }

    // ================= THE AI BRAIN (15-step reasoning) =================
    function chooseAi(g, maxDepth) {
      AI_NODES = 0;
      const startAll = performance.now();
      const activeColor = g.turn();
      const maximizing = activeColor === "w";

      // STEP 2: generate every legal move (illegal ones are already rejected)
      let rootMoves = ordered(g);
      if (!rootMoves.length) { aiAnalysis = null; return null; }

      // STEP 1 book shortcut: opening book still uses full understanding
      const fenStripped = g.fen().split(" ").slice(0, 2).join(" ");
      if (OPENING_BOOK[fenStripped]) {
        const list = OPENING_BOOK[fenStripped];
        const bMove = list[Math.floor(Math.random() * list.length)];
        const legal = rootMoves.find(m => m.from === bMove.from && m.to === bMove.to);
        if (legal) {
          const played = g.move({ from: legal.from, to: legal.to, promotion: legal.promotion || "q" });
          const pvSan = played ? played.san : (legal.from + legal.to);
          const sc = evaluate(g); g.undo();
          const imaginedBook = maxDepth >= 4 ? fastImagine(g, 1200, IMAGINE_TARGET) : 0;
          aiAnalysis = {
            score: (sc / 100), depth: 0, nodes: 0,
            imagined: imaginedBook,
            best: pvSan, pv: [pvSan],
            alternatives: [],
            tactics: tacticalIdeas(g, legal),
            strategy: ["Book move \u2014 known strong opening theory"],
            book: true
          };
          return legal;
        }
      }

      // STEP 7 + iterative deepening to the configured depth (max 10)
      const limit = 1000;
      let best = null, bestScore = 0;
      let scoredRoot = [];
      let reached = 0;

      for (let d = 1; d <= maxDepth; d++) {
        if (performance.now() - startAll > limit) break;
        let bestVal = maximizing ? -Infinity : Infinity;
        let dBest = null;
        const thisRoot = [];
        for (const m of rootMoves) {
          g.move(m);
          const v = mini(g, d - 1, -Infinity, Infinity, !maximizing, startAll, limit);
          g.undo();
          thisRoot.push({ m, v });
          if (maximizing ? v > bestVal : v < bestVal) { bestVal = v; dBest = m; }
        }
        if (dBest) {
          best = dBest; bestScore = bestVal; reached = d;
          scoredRoot = thisRoot.sort((a, b) => maximizing ? b.v - a.v : a.v - b.v);
          // Move ordering feedback: search best move first next iteration
          rootMoves = scoredRoot.map(x => x.m);
        }
        if (Math.abs(bestVal) > 90000) break; // forced mate found, stop early
      }

      if (!best) { best = rootMoves[0] || null; }
      if (!best) { aiAnalysis = null; return null; }

      // STEP 9 + STEP 12: king safety & blunder self-verification.
      // If the top choice hangs material and a near-equal safer move exists, switch.
      const topDanger = moveHangsMaterial(g, best);
      if (topDanger >= 300 && scoredRoot.length > 1) {
        for (let i = 1; i < Math.min(scoredRoot.length, 6); i++) {
          const alt = scoredRoot[i];
          const gap = Math.abs(alt.v - bestScore);
          if (gap <= 120 && moveHangsMaterial(g, alt.m) < topDanger) {
            best = alt.m; bestScore = alt.v; break;
          }
        }
      }

      // STEP 14: build the analysis output
      const playedBest = g.move({ from: best.from, to: best.to, promotion: best.promotion || "q" });
      const bestSan = playedBest ? playedBest.san : (best.from + best.to);
      const restPV = extractPV(g, 8);
      g.undo();
      const pv = [bestSan, ...restPV];
      const alternatives = scoredRoot.slice(0, 4).map(x => {
        const played = g.move({ from: x.m.from, to: x.m.to, promotion: x.m.promotion || "q" });
        const s = played ? played.san : (x.m.from + x.m.to);
        g.undo();
        return { san: s, score: (x.v / 100) };
      });

      // IMAGINATION PASS: explore 2,000,000+ candidate moves on the fast
      // typed-array board within the remaining thinking budget. The deep
      // minimax result is confirmed against this massive sample space.
      let imagined = AI_NODES;
      if (maxDepth >= 4) {
        const remaining = Math.max(400, 1900 - (performance.now() - startAll));
        imagined += fastImagine(g, remaining, IMAGINE_TARGET - AI_NODES);
      }

      aiAnalysis = {
        score: (bestScore / 100),
        depth: reached,
        nodes: AI_NODES,
        imagined,
        best: bestSan,
        pv,
        alternatives,
        tactics: tacticalIdeas(g, best),
        strategy: strategicIdeas(g, best),
        book: false
      };

      // STEP 13: learning system \u2014 remember this position evaluation
      rememberPosition(g.positionKey(), bestScore, reached);

      return best;
    }

    // ---- STEP 3: DANGER ANALYSIS (lightweight static exchange) ----
    function moveHangsMaterial(g, m) {
      const mover = g.turn();
      g.move(m);
      let worst = 0;
      const enemy = g.turn();
      const replies = g.moves({ verbose: true });
      for (const r of replies) {
        if (r.captured) {
          const gain = values[r.captured] || 0;
          g.move(r);
          const recapture = g.moves({ verbose: true }).some(x => x.to === r.to && x.captured);
          const net = gain - (recapture ? (values[r.piece] || 0) : 0);
          g.undo();
          if (net > worst) worst = net;
        }
      }
      g.undo();
      return worst;
    }

    // ---- STEP 4: TACTICAL IDEAS for analysis output ----
    function tacticalIdeas(g, m) {
      const ideas = [];
      if (m.captured) ideas.push("Wins " + pieceName(m.captured));
      if (m.promotion) ideas.push("Pawn promotion");
      g.move(m);
      if (g.isCheckmate()) ideas.push("Checkmate");
      else if (g.isCheck()) ideas.push("Delivers check");
      const enemy = g.turn();
      let attacked = 0;
      for (const rr of "12345678") for (const ff of "abcdefgh") {
        const sq = ff + rr; const pc = g.get(sq);
        if (pc && pc.color === enemy && pc.type !== "p") {
          if (g.isAttacked(sq, m.color)) attacked++;
        }
      }
      g.undo();
      if (attacked >= 2 && (m.piece === "n" || m.piece === "q" || m.piece === "b")) ideas.push("Creates a fork/double attack");
      return ideas;
    }

    // ---- STEP 5: STRATEGIC IDEAS for analysis output ----
    function strategicIdeas(g, m) {
      const ideas = [];
      const cf = m.to[0], cr = m.to[1];
      if ((cf >= "c" && cf <= "f") && (cr === "4" || cr === "5")) ideas.push("Fights for the center");
      if (m.castle) ideas.push("Castles for king safety");
      if (m.piece === "n" || m.piece === "b") ideas.push("Develops a piece");
      if (m.piece === "r") ideas.push("Activates a rook");
      if (m.piece === "p" && (cr === "5" || cr === "6" || cr === "3" || cr === "4")) ideas.push("Gains space");
      if (!ideas.length) ideas.push("Improves piece activity");
      return ideas;
    }

    // ---- STEP 14: extract principal variation from the transposition table ----
    function extractPV(g, maxLen) {
      const pv = []; let count = 0;
      for (let i = 0; i < maxLen; i++) {
        const e = TRANSPOSITION_TABLE.get(g.positionKey());
        if (!e || !e.bestMove) break;
        const bm = e.bestMove;
        const played = g.move({ from: bm.from, to: bm.to, promotion: bm.promotion || "q" });
        if (!played) break;
        pv.push(played.san); count++;
        if (g.isGameOver()) break;
      }
      for (let i = 0; i < count; i++) g.undo();
      return pv;
    }

    // Sound Effects
    let audio = null;
    function ctx() {
      if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
      if (audio.state === "suspended") audio.resume();
      return audio;
    }
    
    function beep(f, d, type = "sine", gain = .14, delay = 0) {
      if (!state.sound) return;
      const c = ctx(), o = c.createOscillator(), g = c.createGain(), t = c.currentTime + delay;
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t + .005);
      g.gain.exponentialRampToValueAtTime(.0001, t + d);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + d + .02);
    }
    
    function noise(d = .05, gain = .16) {
      if (!state.sound) return;
      const c = ctx(), b = c.createBuffer(1, c.sampleRate * d, c.sampleRate), a = b.getChannelData(0);
      for (let i = 0; i < a.length; i++) a[i] = (Math.random() * 2 - 1) * (1 - i / a.length);
      const s = c.createBufferSource(), g = c.createGain();
      s.buffer = b;
      g.gain.setValueAtTime(gain, c.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + d);
      s.connect(g); g.connect(c.destination); s.start();
    }
    
    function playMoveEvent(m) {
      beep(360, .08, "triangle", .16);
      beep(200, .09, "sine", .09, .005);
      if (m.captured) { noise(.045, .2); beep(170, .16, "square", .15); beep(85, .2, "sawtooth", .1, .015); }
      if (state.game.isCheckmate()) {
        beep(720, .18, "sawtooth", .16); beep(540, .22, "sawtooth", .14, .14); beep(360, .36, "sawtooth", .14, .3);
      } else if (state.game.isCheck()) { beep(900, .1, "square", .16); beep(1380, .16, "square", .14, .08); }
    }
    
    function soundIllegal(real) { if (real) beep(140, .09, "square", .09); }
